version: 1
applications:
  - appRoot: saas-frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    customRules:
      - source: "/<*>"
        target: "/index.html"
        status: "200"